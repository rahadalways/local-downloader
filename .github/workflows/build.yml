name: Build Local Downloader

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build Standalone Executable
      run: |
        python build_app.py

    - name: Create Installation Package Zip
      run: |
        Compress-Archive -Path dist/LocalDownloader.exe, SetupInstaller.bat, install.ps1 -DestinationPath LocalDownloader-Setup.zip

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v3
      with:
        name: LocalDownloader-Windows-Setup
        path: LocalDownloader-Setup.zip
